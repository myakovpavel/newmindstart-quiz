<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewMindStart | Personal Quiz</title>
    <meta
      name="description"
      content="A mobile-first NewMindStart quiz to map focus, energy, emotional balance, and build a personalized growth plan."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient--top"></div>
    <div class="ambient ambient--bottom"></div>

    <main class="quiz-shell">
      <header class="quiz-header">
        <button
          id="backButton"
          class="back-button"
          type="button"
          aria-label="Go back"
        >
          &#8592;
        </button>

        <div class="brand">
          <span class="brand-mark">&#10048;</span>
          <span class="brand-text">NEWMINDSTART</span>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-track">
            <div id="progressBar" class="progress-fill"></div>
          </div>
          <span id="progressText" class="progress-text">0%</span>
        </div>
      </header>

      <section id="app" class="quiz-card"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
